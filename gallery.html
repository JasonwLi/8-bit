<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>8-Bit Dynasties — Sprite Gallery</title>
  <style>
    :root { --bg:#0b0a16; --panel:#1d1a2e; --line:#35304f; --text:#e7e3f5; --muted:#9a93c0; --accent:#ffd700; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:ui-monospace,Menlo,Consolas,monospace; }
    header { position:sticky; top:0; z-index:10; background:rgba(11,10,22,.95); border-bottom:1px solid var(--line);
             padding:14px 20px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; backdrop-filter:blur(4px); }
    h1 { margin:0; font-size:20px; color:var(--accent); letter-spacing:1px; }
    .count { color:var(--muted); font-size:13px; }
    .controls { margin-left:auto; display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted); }
    button.bg { border:1px solid var(--line); background:var(--panel); color:var(--text); padding:4px 10px;
                border-radius:6px; cursor:pointer; font:inherit; font-size:12px; }
    button.bg.active { border-color:var(--accent); color:var(--accent); }
    main { padding:20px; }
    section h2 { font-size:14px; color:#7ec8ff; text-transform:uppercase; letter-spacing:1px;
                 border-bottom:1px solid var(--line); padding-bottom:6px; margin:28px 0 14px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; align-items:start; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px;
            display:flex; flex-direction:column; align-items:center; gap:8px; }
    .stage { width:100%; min-height:120px; padding:8px 0; display:flex; align-items:center; justify-content:center;
             border-radius:8px; overflow:hidden; image-rendering:pixelated; }
    .stage.checker { background-image:
        linear-gradient(45deg,#2a2740 25%,transparent 25%),linear-gradient(-45deg,#2a2740 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#2a2740 75%),linear-gradient(-45deg,transparent 75%,#2a2740 75%);
      background-size:16px 16px; background-position:0 0,0 8px,8px -8px,-8px 0; background-color:#3a3556; }
    .stage.dark { background:#14121f; } .stage.light { background:#cfcadd; } .stage.field { background:#1a1426; }
    .stage canvas { image-rendering:pixelated; }
    .name { font-size:12px; color:var(--text); word-break:break-all; text-align:center; }
    .dim { font-size:11px; color:var(--muted); }
    .empty { color:var(--muted); padding:40px; text-align:center; }
    #phaser-hidden { position:absolute; width:1px; height:1px; left:-9999px; top:-9999px; overflow:hidden; }
  </style>
</head>
<body>
  <header>
    <h1>⚔ Sprite Gallery</h1>
    <span class="count" id="count">Generating…</span>
    <div class="controls">
      <span>zoom</span>
      <input id="zoom" type="range" min="1" max="8" value="4" step="1" />
      <span>bg</span>
      <button class="bg active" data-bg="checker">checker</button>
      <button class="bg" data-bg="dark">dark</button>
      <button class="bg" data-bg="light">light</button>
      <button class="bg" data-bg="field">field</button>
    </div>
  </header>
  <main id="main"><div class="empty">Booting texture pipeline…</div></main>
  <div id="phaser-hidden"></div>
  <script type="module" src="/src/gallery-main.js"></script>
</body>
</html>
