name: Deploy to Railway

# Auto-deploy: every push to main (and manual runs) build + deploy to the Railway
# "strong-creativity" service. RAILWAY_TOKEN is a repo secret (a Railway project token).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy to Railway
        run: railway up --ci --service strong-creativity
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
